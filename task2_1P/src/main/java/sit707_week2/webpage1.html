<html>
<body>

<style>
.information {
  background-color: #f0f8ff;
  color: #333;
  padding: 10px;
  border: 1px solid #ccc;
}
</style>

<h2>Student Registration Form</h2>

<form action="/action_page.php">

  <input type="radio" id="male" name="gender" value="m" />Male &nbsp;
  <input type="radio" id="female" name="gender" value="f" />Female <br><br>

  <label for="fname">First name:</label><br>
  <input class="information" type="text" id="fname" name="fname" placeholder="Enter first name"><br><br>

  <label for="lname">Last name:</label><br>
  <input class="information" type="text" id="lname" name="lname" placeholder="Enter last name"><br><br>

  <label for="newsletter">Subscribe to Newsletter:</label>
  <input type="checkbox" id="newsletter" name="newsletter" value="1" /><br><br>

  <input type="submit" id="submitBtn" value="Register">

</form>

</body>
</html>
